name: Full CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_NOORHUSEEN }}/devops-app .

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_NOORHUSEEN }}" --password-stdin

    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_NOORHUSEEN }}/devops-app

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker ps -q --filter "publish=80" | xargs -r docker stop
          docker ps -aq --filter "publish=80" | xargs -r docker rm
          docker pull ${{ secrets.DOCKER_NOORHUSEEN }}/devops-app
          docker run -d -p 80:80 --name devops-app ${{ secrets.DOCKER_NOORHUSEEN }}/devops-app