name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_NOORHUSEEN }}" --password-stdin

      - name: Build and Push
        run: |
          docker build -t noorhuseen/devops-app:latest .
          docker push noorhuseen/devops-app:latest